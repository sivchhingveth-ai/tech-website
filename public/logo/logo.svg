<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="keycapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8e8ff"/>
      <stop offset="100%" stop-color="#0a4fcf"/>
    </linearGradient>
    <clipPath id="sqClip">
      <rect x="24" y="24" width="464" height="464" rx="88"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="#020d1f"/>

  <!-- Border rim -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#2a7fff" stroke-width="3"/>

  <!-- Keycap grid (clipped inside rounded square) -->
  <g clip-path="url(#sqClip)">

    <!-- Row 1 -->
    <rect x="54"  y="100" width="90"  height="78" rx="14" fill="url(#keycapGrad)"/>
    <rect x="154" y="100" width="60"  height="78" rx="14" fill="url(#keycapGrad)" opacity="0.75"/>
    <rect x="224" y="100" width="60"  height="78" rx="14" fill="url(#keycapGrad)" opacity="0.55"/>
    <rect x="294" y="100" width="90"  height="78" rx="14" fill="url(#keycapGrad)" opacity="0.35"/>

    <!-- Row 2 -->
    <rect x="54"  y="192" width="60"  height="78" rx="14" fill="url(#keycapGrad)" opacity="0.50"/>
    <rect x="124" y="192" width="222" height="78" rx="14" fill="url(#keycapGrad)"/>
    <rect x="356" y="192" width="60"  height="78" rx="14" fill="url(#keycapGrad)" opacity="0.40"/>

    <!-- Row 3 -->
    <rect x="54"  y="284" width="52"  height="78" rx="14" fill="url(#keycapGrad)" opacity="0.30"/>
    <rect x="116" y="284" width="238" height="78" rx="14" fill="url(#keycapGrad)" opacity="0.65"/>
    <rect x="364" y="284" width="52"  height="78" rx="14" fill="url(#keycapGrad)" opacity="0.25"/>

  </g>

</svg>
