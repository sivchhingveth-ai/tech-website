<svg width="512" height="400" viewBox="0 0 512 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="keycapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8e8ff"/>
      <stop offset="100%" stop-color="#0a4fcf"/>
    </linearGradient>
    <linearGradient id="keycapDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6a"/>
      <stop offset="100%" stop-color="#0a1e3d"/>
    </linearGradient>
    <clipPath id="sqClip">
      <rect x="24" y="24" width="464" height="352" rx="88"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="464" height="352" rx="88" fill="#020d1f"/>

  <!-- Border rim -->
  <rect x="24" y="24" width="464" height="352" rx="88" fill="none" stroke="#2a7fff" stroke-width="3"/>

  <!-- Keycap grid (clipped inside rounded rectangle) -->
  <g clip-path="url(#sqClip)">

    <!-- Row 1: Top function row -->
    <rect x="44"  y="54" width="56"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.6"/>
    <rect x="110" y="54" width="56"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.8"/>
    <rect x="176" y="54" width="56"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.95"/>
    <rect x="242" y="54" width="56"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.7"/>
    <rect x="308" y="54" width="56"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.5"/>
    <rect x="374" y="54" width="56"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.35"/>
    <rect x="440" y="54" width="32"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.25"/>

    <!-- Row 2: Number row -->
    <rect x="44"  y="116" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.45"/>
    <rect x="98"  y="116" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.7"/>
    <rect x="152" y="116" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.85"/>
    <rect x="206" y="116" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.6"/>
    <rect x="260" y="116" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.95"/>
    <rect x="314" y="116" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.5"/>
    <rect x="368" y="116" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.4"/>
    <rect x="422" y="116" width="50"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.3"/>

    <!-- Row 3: QWERTY row with wider keys -->
    <rect x="44"  y="178" width="62"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.55"/>
    <rect x="116" y="178" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.8"/>
    <rect x="170" y="178" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.9"/>
    <rect x="224" y="178" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.65"/>
    <rect x="278" y="178" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.95"/>
    <rect x="332" y="178" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.7"/>
    <rect x="386" y="178" width="86"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.4"/>

    <!-- Row 4: Home row (spacebar row) -->
    <rect x="44"  y="240" width="72"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.5"/>
    <rect x="126" y="240" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.75"/>
    <rect x="180" y="240" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.85"/>
    <rect x="234" y="240" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.6"/>
    <rect x="288" y="240" width="44"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.95"/>
    <rect x="342" y="240" width="130" height="52" rx="10" fill="url(#keycapGrad)" opacity="0.35"/>

    <!-- Row 5: Bottom modifier row -->
    <rect x="44"  y="302" width="68"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.3"/>
    <rect x="122" y="302" width="56"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.4"/>
    <rect x="188" y="302" width="160" height="52" rx="10" fill="url(#keycapGrad)" opacity="0.6"/>
    <rect x="358" y="302" width="56"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.35"/>
    <rect x="424" y="302" width="48"  height="52" rx="10" fill="url(#keycapGrad)" opacity="0.25"/>

  </g>

</svg>
